<!DOCTYPE html>
<html>
<head>
    <title>Stock Alert App</title>
</head>

<body>

<h1>Stock Alert System</h1>

<form method="POST">

<label>Stock Symbol</label>
<input type="text" name="stock" required>

<br><br>

<label>Company Name</label>
<input type="text" name="company" required>

<br><br>

<button type="submit">Check Stock</button>

</form>

{% if result %}

<h2>{{ result.stock }} {{ result.direction }} {{ result.percent }}%</h2>

<h3>Latest News</h3>

<ul>
{% for article in result.news %}
<li>
<strong>{{ article.title }}</strong><br>
{{ article.description }}
</li>
{% endfor %}
</ul>

{% endif %}

</body>
</html>
